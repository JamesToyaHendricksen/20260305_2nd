<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ToDo一覧</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">ToDo一覧</h1>
        <a th:href="@{/todo/new}" class="btn btn-primary">新規作成</a>
    </div>

    <div th:if="${success}" class="alert alert-success auto-dismiss" role="alert" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger auto-dismiss" role="alert" th:text="${error}"></div>

    <div th:if="${#lists.isEmpty(todos)}" class="card border-0 shadow-sm">
        <div class="card-body text-center py-5">
            <p class="mb-3">ToDoがまだ登録されていません</p>
            <a th:href="@{/todo/new}" class="btn btn-outline-primary">新規作成</a>
        </div>
    </div>

    <div th:unless="${#lists.isEmpty(todos)}" class="card border-0 shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>タイトル</th>
                        <th>完了状態</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="todo : ${todos}">
                        <td th:text="${todo.id}"></td>
                        <td>
                            <span th:text="${todo.title}"
                                  th:classappend="${todo.completed} ? 'text-decoration-line-through text-muted' : ''"></span>
                        </td>
                        <td>
                            <span th:text="${todo.completed} ? '完了' : '未完了'"></span>
                        </td>
                        <td>
                            <div class="d-flex gap-2 flex-wrap">
                                <a th:href="@{/todo/{id}/edit(id=${todo.id})}" class="btn btn-outline-primary btn-sm">編集</a>

                                <form th:action="@{/todo/{id}/toggle(id=${todo.id})}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-outline-success btn-sm"
                                            th:text="${todo.completed} ? '未完了に戻す' : '完了にする'"></button>
                                </form>

                                <form th:action="@{/todo/{id}/delete(id=${todo.id})}" method="post" class="d-inline"
                                      onsubmit="return confirm('本当に削除しますか？');">
                                    <button type="submit" class="btn btn-danger btn-sm">削除</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    setTimeout(function () {
        document.querySelectorAll('.auto-dismiss').forEach(function (element) {
            element.remove();
        });
    }, 3000);
</script>
</body>
</html>
