<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登録内容の確認</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h4 mb-4">登録内容の確認</h1>

                    <div class="mb-3">
                        <label class="form-label">タイトル</label>
                        <input type="text" class="form-control" th:value="${title}" readonly>
                    </div>

                    <form th:action="@{/todo/complete}" method="post">
                        <input type="hidden" name="title" th:value="${title}">
                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-outline-secondary" onclick="history.back()">戻る</button>
                            <button type="submit" class="btn btn-primary">登録</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
